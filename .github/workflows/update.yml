name: Update Marvel Champions Stats

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas plotly scipy

      - name: Fetch BGG data
        env:
          BGG_SESSION_ID: ${{ secrets.BGG_SESSION_ID }}
          BGG_PASSWORD: ${{ secrets.BGG_PASSWORD }}
          BGG_USERNAME: ${{ secrets.BGG_USERNAME }}
        run: python BGG_Export.py

      - name: Build visualizations
        run: python Visualize_all.py

      - name: Commit updated page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: update stats $(date +'%Y-%m-%d')"
          git push
