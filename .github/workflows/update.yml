name: Update Marvel Champions Stats

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'config/**'
  schedule:
    - cron: '*/15 * * * *'   # Alle 15 Minuten
  workflow_dispatch:          # Manueller Start aus GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas plotly scipy

      - name: Check for BGG changes
        id: check_changes
        env:
          BGG_SESSION_ID: ${{ secrets.BGG_SESSION_ID }}
          BGG_PASSWORD:   ${{ secrets.BGG_PASSWORD }}
          BGG_USERNAME:   ${{ secrets.BGG_USERNAME }}
        run: python check_bgg_changes.py

      - name: Fetch BGG data
        if: steps.check_changes.outputs.changed == 'true' || github.event_name != 'schedule'
        env:
          BGG_SESSION_ID: ${{ secrets.BGG_SESSION_ID }}
          BGG_PASSWORD:   ${{ secrets.BGG_PASSWORD }}
          BGG_USERNAME:   ${{ secrets.BGG_USERNAME }}
        run: python BGG_Export.py

      - name: Build visualizations
        if: steps.check_changes.outputs.changed == 'true' || github.event_name != 'schedule'
        run: python Visualize_all.py

      - name: Commit updated page
        if: steps.check_changes.outputs.changed == 'true' || github.event_name != 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html bgg_state.json
          git diff --staged --quiet || git commit -m "chore: update stats $(date +'%Y-%m-%d %H:%M') [skip ci]"
          git push
